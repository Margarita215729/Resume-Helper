name: Deploy to GitHub Pages (DISABLED - Use Azure Container Apps instead)

# Disabled because the app uses server-side features (API routes, auth, middleware)
# that are incompatible with GitHub Pages static hosting
on:
  # push:
  #   branches: [ main ]
  workflow_dispatch:
    inputs:
      force_enable:
        description: 'Force enable this workflow (not recommended)'
        required: false
        default: 'false'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Setup GitHub Pages
      uses: actions/configure-pages@v4

    - name: Set environment variables
      run: |
        echo "GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }}" >> .env.local
        echo "GITHUB_MODEL_ENDPOINT=https://models.github.ai/inference" >> .env.local
        echo "GITHUB_MODEL_NAME=openai/o4-mini" >> .env.local

    - name: Build application
      run: npm run build
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GITHUB_MODEL_ENDPOINT: https://models.github.ai/inference
        GITHUB_MODEL_NAME: openai/o4-mini

    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: ./out

  deploy:
    runs-on: ubuntu-latest
    needs: build
    
    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
