name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      force_deploy:
        description: 'Force deployment to GitHub Pages'
        required: false
        default: 'true'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Setup GitHub Pages
      uses: actions/configure-pages@v4

    - name: Set environment variables
      run: |
        echo "GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }}" >> .env.local
        echo "GITHUB_MODEL_ENDPOINT=https://models.github.ai/inference" >> .env.local
        echo "GITHUB_MODEL_NAME=openai/o4-mini" >> .env.local

    - name: Build static application for GitHub Pages
      run: |
        npm run build:static
        echo "Checking build output..."
        ls -la ./
        if [ ! -d "./out" ]; then
          echo "out directory not found, checking for alternative locations..."
          if [ -d "./.next" ]; then
            echo "Found .next directory, copying static export..."
            mkdir -p ./out
            if [ -d "./.next/static" ]; then
              mkdir -p ./out/_next
              cp -r ./.next/static ./out/_next/
            fi
            # Copy any generated HTML files
            find . -maxdepth 1 -name "*.html" -exec cp {} ./out/ \; 2>/dev/null || true
          fi
        fi
        echo "Final contents of out directory:"
        ls -la ./out/ || echo "out directory still not found"
      env:
        NEXT_PUBLIC_BASE_PATH: ""
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GITHUB_MODEL_ENDPOINT: "https://models.github.ai/inference"
        GITHUB_MODEL_NAME: "gpt-4o-mini"

    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    
    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
